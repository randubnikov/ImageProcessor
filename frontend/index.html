<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImageProcessor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🖼️</span>
    <div>
      <div class="logo-text">ImageProcessor</div>
      <div class="logo-sub">Serverless image resizing on AWS</div>
    </div>
  </div>
  <label class="upload-btn">
    <span id="upload-label">+ Upload Image</span>
    <input type="file" id="file-input" accept="image/*" style="display:none">
  </label>
</header>

<main>
  <div id="status-bar" style="display:none" class="status-bar"></div>

  <div id="gallery" class="gallery">
    <div class="empty">Loading images...</div>
  </div>
</main>

<div id="modal" class="modal" style="display:none">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title"></div>
    <img id="modal-img" src="" alt="" class="modal-img">
    <div class="download-row" id="download-row"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
